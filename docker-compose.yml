services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-daily-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_daily_planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d smart_daily_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
