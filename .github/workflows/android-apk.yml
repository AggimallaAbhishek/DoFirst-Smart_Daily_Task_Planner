name: Android APK

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm install

      - name: Print toolchain versions
        run: |
          node -v
          npm -v
          java -version
          sdkmanager --version

      - name: Build web assets
        run: npm run build --workspace frontend

      - name: Prepare Capacitor Android project
        run: |
          cd frontend
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android
          chmod +x android/gradlew

      - name: Build Android debug APK
        run: |
          cd frontend/android
          ./gradlew --no-daemon assembleDebug --stacktrace --info | tee ../gradle-build.log

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-gradle-log
          path: frontend/gradle-build.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Android build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-android-outputs
          path: frontend/android/app/build/outputs
          if-no-files-found: ignore

      - name: Build summary
        run: |
          echo "APK build completed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: dofirst-debug-apk" >> "$GITHUB_STEP_SUMMARY"
          echo "File: frontend/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_STEP_SUMMARY"
