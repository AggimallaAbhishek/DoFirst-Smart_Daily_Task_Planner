name: Android APK

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Install Android SDK components
        run: |
          set -euo pipefail
          sdkmanager --install "platform-tools" "platforms;android-36" || true
          sdkmanager --install "build-tools;36.0.0" || sdkmanager --install "build-tools;35.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Print toolchain versions
        run: |
          set -euo pipefail
          node -v
          npm -v
          java -version
          sdkmanager --version
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

      - name: Validate frontend build env for APK
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
          VITE_GOOGLE_NATIVE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_NATIVE_CLIENT_ID }}
          VITE_GOOGLE_REDIRECT_URI: ${{ vars.VITE_GOOGLE_REDIRECT_URI }}
        run: |
          set -euo pipefail
          if [ -z "$VITE_API_URL" ]; then
            echo "Missing GitHub variable: VITE_API_URL"
            exit 1
          fi

          if [ -z "${VITE_GOOGLE_WEB_CLIENT_ID:-}" ] && [ -z "${VITE_GOOGLE_CLIENT_ID:-}" ]; then
            echo "Missing Google web client id secret. Set VITE_GOOGLE_WEB_CLIENT_ID (preferred) or VITE_GOOGLE_CLIENT_ID."
            exit 1
          fi

          if [ -z "$VITE_GOOGLE_REDIRECT_URI" ]; then
            echo "Missing GitHub variable: VITE_GOOGLE_REDIRECT_URI"
            exit 1
          fi

      - name: Build web assets
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
          VITE_GOOGLE_NATIVE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_NATIVE_CLIENT_ID }}
          VITE_GOOGLE_REDIRECT_URI: ${{ vars.VITE_GOOGLE_REDIRECT_URI }}
          VITE_APP_DOWNLOAD_URL: ${{ vars.VITE_APP_DOWNLOAD_URL }}
        run: npm run build --workspace frontend

      - name: Prepare Capacitor Android project
        run: |
          set -euo pipefail
          cd frontend
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android
          chmod +x android/gradlew
          echo "Prepared Capacitor Android project."

      - name: Build Android debug APK
        run: |
          set -euo pipefail
          cd frontend/android
          ./gradlew --no-daemon clean assembleDebug --stacktrace --warning-mode all --console plain | tee ../gradle-build.log

      - name: Print Gradle failure summary
        if: failure()
        run: |
          set -euo pipefail
          echo "Gradle build failed. Extracting the most relevant lines from frontend/gradle-build.log"
          echo ""
          echo "---- FAILURE SECTION ----"
          sed -n '/FAILURE: Build failed with an exception\./,$p' frontend/gradle-build.log | head -n 160 || true
          echo ""
          echo "---- KEY ERROR LINES ----"
          rg -n "FAILURE:|What went wrong:|Execution failed for task|error:|Caused by:|> Task " frontend/gradle-build.log | tail -n 120 || true
          echo ""
          echo "---- LAST 120 LINES ----"
          tail -n 120 frontend/gradle-build.log || true

      - name: Write Gradle failure summary
        if: failure()
        run: |
          set -euo pipefail
          {
            echo "## Android build failure"
            echo ""
            echo '```text'
            sed -n '/FAILURE: Build failed with an exception\./,$p' frontend/gradle-build.log | head -n 120 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Inspect APK outputs
        if: always()
        run: |
          set -euo pipefail
          echo "Listing APK outputs..."
          ls -la frontend/android/app/build/outputs/apk || true
          ls -la frontend/android/app/build/outputs/apk/debug || true
          find frontend/android/app/build/outputs -name "*.apk" -type f || true

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-gradle-log
          path: frontend/gradle-build.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Android build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-android-outputs
          path: frontend/android/app/build/outputs
          if-no-files-found: ignore

      - name: Upload Android build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dofirst-android-reports
          path: frontend/android/app/build/reports
          if-no-files-found: ignore

      - name: Build summary
        run: |
          set -euo pipefail
          echo "APK build completed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: dofirst-debug-apk" >> "$GITHUB_STEP_SUMMARY"
          echo "File(s): frontend/android/app/build/outputs/apk/debug/*.apk" >> "$GITHUB_STEP_SUMMARY"
