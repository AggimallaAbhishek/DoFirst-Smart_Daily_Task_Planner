name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_daily_planner
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner -d smart_daily_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/smart_daily_planner
      TEST_DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/smart_daily_planner
      JWT_SECRET: ci-test-secret
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:3000
      TRIVY_MAX_HIGH_CRITICAL_TOTAL: ${{ vars.TRIVY_MAX_HIGH_CRITICAL_TOTAL || '15' }}
      TRIVY_FAIL_ON_FIXABLE_ONLY: ${{ vars.TRIVY_FAIL_ON_FIXABLE_ONLY || 'true' }}
      TRIVY_BLOCK_ON_INFRA_FAILURE: ${{ vars.TRIVY_BLOCK_ON_INFRA_FAILURE || 'false' }}
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Dependency install attempt ${attempt}/3"
            if npm ci --no-audit --no-fund; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Dependency installation failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Lint code
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install git-secrets
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            rm -rf /tmp/git-secrets
            echo "git-secrets install attempt ${attempt}/3"
            if git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets && \
              sudo make --directory /tmp/git-secrets install; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install git-secrets after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Scan for committed secrets
        run: |
          git secrets --install
          git secrets --scan -r

      - name: Run database migrations
        run: |
          set -euo pipefail
          if ! npm run db:migrate --workspace backend; then
            echo "Workspace migration command failed, retrying via backend directory..."
            (cd backend && npm run db:migrate)
          fi

      - name: Run backend tests
        run: |
          set -euo pipefail
          if ! npm run test --workspace backend; then
            echo "Workspace backend test command failed, retrying via backend directory..."
            (cd backend && npm test)
          fi

      - name: Build applications
        run: npm run build

      - name: Build backend container
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Docker build attempt ${attempt}/3"
            if docker build -t smart-daily-planner-backend ./backend; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Docker build failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-v1
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Scan container image with Trivy
        run: bash .github/scripts/trivy-scan.sh

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            /tmp/trivy-lib.json
            /tmp/trivy-lib-summary.json
            /tmp/trivy-os-report.txt
          if-no-files-found: ignore

      - name: Install Playwright browser
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Playwright install attempt ${attempt}/3"
            if npx playwright install --with-deps chromium; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Playwright browser installation failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Run Playwright E2E tests
        run: |
          set -euo pipefail
          if ! npm run test:e2e --workspace frontend; then
            echo "Workspace frontend E2E command failed, retrying via frontend directory..."
            (cd frontend && npm run test:e2e)
          fi
