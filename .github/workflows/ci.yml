name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_daily_planner
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner -d smart_daily_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/smart_daily_planner
      TEST_DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/smart_daily_planner
      JWT_SECRET: ci-test-secret
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      ALLOWED_ORIGINS: http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          sudo make --directory /tmp/git-secrets install

      - name: Scan for committed secrets
        run: |
          git secrets --install
          git secrets --scan -r

      - name: Run backend tests
        run: npm run test --workspace backend

      - name: Build applications
        run: npm run build

      - name: Build backend container
        run: docker build -t smart-daily-planner-backend ./backend

      - name: Scan container image with Trivy
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/trivy"

          for attempt in 1 2 3; do
            echo "Trivy scan attempt ${attempt}/3"
            if docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.cache/trivy:/root/.cache/" \
              -e TRIVY_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-db:2 \
              aquasec/trivy:0.65.0 image \
              --format table \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --no-progress \
              smart-daily-planner-backend; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Trivy scan failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npm run db:migrate --workspace backend

      - name: Run Playwright E2E tests
        run: npm run test:e2e --workspace frontend
