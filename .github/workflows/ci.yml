name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_daily_planner
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner -d smart_daily_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/smart_daily_planner
      TEST_DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/smart_daily_planner
      JWT_SECRET: ci-test-secret
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      ALLOWED_ORIGINS: http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install git-secrets
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          sudo make --directory /tmp/git-secrets install

      - name: Scan for committed secrets
        run: |
          git secrets --install
          git secrets --scan -r

      - name: Run backend tests
        run: npm run test --workspace backend

      - name: Build applications
        run: npm run build

      - name: Build backend container
        run: docker build -t smart-daily-planner-backend ./backend

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: smart-daily-planner-backend
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npm run db:migrate --workspace backend

      - name: Run Playwright E2E tests
        run: npm run test:e2e --workspace frontend
