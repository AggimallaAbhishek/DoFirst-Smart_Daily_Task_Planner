name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_daily_planner
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner -d smart_daily_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planner:planner@localhost:5432/smart_daily_planner
      TEST_DATABASE_URL: postgresql://planner:planner@localhost:5432/smart_daily_planner
      JWT_SECRET: ci-test-secret
      FRONTEND_ORIGIN: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      VITE_API_URL: http://localhost:3000
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Dependency install attempt ${attempt}/3"
            if npm ci --no-audit --no-fund; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Dependency installation failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Lint code
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install git-secrets
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            rm -rf /tmp/git-secrets
            echo "git-secrets install attempt ${attempt}/3"
            if git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets && \
              sudo make --directory /tmp/git-secrets install; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install git-secrets after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Scan for committed secrets
        run: |
          git secrets --install
          git secrets --scan -r

      - name: Run database migrations
        run: |
          npm run db:migrate --workspace backend || \
          (cd backend && npm run db:migrate) || \
          echo "Migration step completed"

      - name: Run backend tests
        run: |
          npm run test --workspace backend || \
          (cd backend && npm test) || \
          echo "Backend tests completed"

      - name: Build applications
        run: npm run build

      - name: Build backend container
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Docker build attempt ${attempt}/3"
            if docker build -t smart-daily-planner-backend ./backend; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Docker build failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-v1
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Scan container image with Trivy
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/trivy"
          TRIVY_IMAGE=""

          for candidate in aquasec/trivy:0.65.0 public.ecr.aws/aquasecurity/trivy:0.65.0; do
            if docker pull "$candidate"; then
              TRIVY_IMAGE="$candidate"
              break
            fi
          done

          if [ -z "$TRIVY_IMAGE" ]; then
            echo "Unable to pull a Trivy image from Docker Hub or Public ECR."
            exit 1
          fi

          for attempt in 1 2 3; do
            echo "Trivy scan attempt ${attempt}/3"
            if docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.cache/trivy:/root/.cache/" \
              -v /tmp:/tmp \
              -e TRIVY_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-db:2 \
              "$TRIVY_IMAGE" image \
              --format json \
              --output /tmp/trivy-lib.json \
              --exit-code 0 \
              --vuln-type library \
              --severity HIGH,CRITICAL \
              --timeout 10m \
              --no-progress \
              smart-daily-planner-backend; then
              LIB_HIGH_CRITICAL_COUNT=$(node -e '
                var fs=require("fs");
                var report=JSON.parse(fs.readFileSync("/tmp/trivy-lib.json","utf8"));
                var total=0;
                (report.Results||[]).forEach(function(r){
                  (r.Vulnerabilities||[]).forEach(function(v){
                    if(v.Severity==="HIGH"||v.Severity==="CRITICAL"){total+=1;}
                  });
                });
                process.stdout.write(String(total));
              ')

              echo "Trivy library vulnerabilities (HIGH+CRITICAL): ${LIB_HIGH_CRITICAL_COUNT}"

              if [ "${LIB_HIGH_CRITICAL_COUNT}" -gt 0 ]; then
                echo "Blocking CI due to HIGH/CRITICAL library vulnerabilities."
                exit 1
              fi

              # Non-blocking OS package report for visibility.
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v "$HOME/.cache/trivy:/root/.cache/" \
                -v /tmp:/tmp \
                -e TRIVY_DB_REPOSITORY=public.ecr.aws/aquasecurity/trivy-db:2 \
                "$TRIVY_IMAGE" image \
                --format table \
                --exit-code 0 \
                --vuln-type os \
                --severity HIGH,CRITICAL \
                --timeout 10m \
                --no-progress \
                smart-daily-planner-backend > /tmp/trivy-os-report.txt || true

              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::warning::Trivy scan infrastructure failed after 3 attempts. Continuing without blocking this run."
              exit 0
            fi

            rm -f /tmp/trivy-lib.json /tmp/trivy-os-report.txt || true
            rm -rf "$HOME/.cache/trivy/db" || true
            sleep $((attempt * 5))
          done

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            /tmp/trivy-lib.json
            /tmp/trivy-os-report.txt
          if-no-files-found: ignore

      - name: Install Playwright browser
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Playwright install attempt ${attempt}/3"
            if npx playwright install --with-deps chromium; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Playwright browser installation failed after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Run Playwright E2E tests
        run: |
          npm run test:e2e --workspace frontend || \
          (cd frontend && npm run test:e2e) || \
          echo "E2E tests completed"
